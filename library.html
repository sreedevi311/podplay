<!DOCTYPE html>

  <title>My Playlist #1</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      /*background: linear-gradient(to bottom, #8d22b8, #000);*/
      color: white;
      background: black;
    }
    .header {
      display: flex;
      align-items: center;
      padding: 20px;
    }
    .playlist-cover {
      width: 180px;
      height: 180px;
      background-image: url('https://i.imgur.com/5Z6F9xK.png'); /* Sample image */
      background-size: cover;
      margin-right: 20px;
      border-radius: 8px;
    }
    .playlist-info {
      flex: 1;
    }
    .playlist-info h1 {
      font-size: 48px;
      margin: 10px 0;
    }
    .playlist-info p {
      color: #ccc;
      margin: 5px 0;
    }
    .controls {
      display: flex;
      align-items: center;
      padding: 0 30px;
    }
    .play-btn {
      background-color:#8d22b8;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      cursor: pointer;
      margin-right: 20px;
    }
    .playlist-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      padding: 0 30px;
    }
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    .song-title {
      color:#8d22b8;
      font-weight: bold;
    }
    .album-cover {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      margin-right: 10px;
    }
    .song-info {
      display: flex;
      align-items: center;
    }
  </style>
</head>
